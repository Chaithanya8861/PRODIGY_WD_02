<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ChronoMax | Horology Stopwatch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #1a1e2a, #0a0c14);
      font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* WATCH THEME BACKGROUND - intricate dial texture */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(90deg, rgba(210, 180, 140, 0.03) 0px, rgba(210, 180, 140, 0.03) 1px, transparent 1px, transparent 40px),
        repeating-linear-gradient(0deg, rgba(210, 180, 140, 0.03) 0px, rgba(210, 180, 140, 0.03) 1px, transparent 1px, transparent 40px),
        radial-gradient(circle at 30% 40%, rgba(255, 215, 150, 0.08) 2%, transparent 3%),
        radial-gradient(circle at 80% 70%, rgba(200, 170, 110, 0.06) 1.5%, transparent 2.5%);
      background-size: 40px 40px, 40px 40px, 60px 60px, 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* subtle vintage vignette */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* main watch case card */
    .stopwatch-card {
      position: relative;
      z-index: 2;
      background: linear-gradient(145deg, rgba(25, 28, 38, 0.85), rgba(12, 15, 24, 0.9));
      backdrop-filter: blur(16px);
      border-radius: 3.5rem;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,240,0.1), 0 0 0 2px rgba(200, 175, 120, 0.2), 0 0 0 6px rgba(0,0,0,0.3);
      padding: 2rem 1.8rem 2rem 1.8rem;
      width: 100%;
      max-width: 660px;
      transition: all 0.3s ease;
      border: 1px solid rgba(210, 180, 140, 0.5);
    }

    /* watch crown decoration */
    .stopwatch-card::before {
      content: "⚙";
      position: absolute;
      top: -12px;
      right: 30px;
      font-size: 2rem;
      opacity: 0.5;
      color: #dbb87c;
      text-shadow: 0 0 4px #ffdd99;
      transform: rotate(15deg);
      font-family: monospace;
    }

    /* time display - like a watch crystal */
    .time-circle {
      background: radial-gradient(circle at 30% 20%, #10131e, #05070e);
      border-radius: 2.5rem;
      padding: 1.3rem 0.8rem;
      margin-bottom: 1.8rem;
      box-shadow: inset 0 8px 18px rgba(0, 0, 0, 0.6), 0 10px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 215, 150, 0.2);
      border: 1px solid rgba(220, 190, 120, 0.6);
      position: relative;
      overflow: hidden;
    }

    /* horology minute track decoration */
    .time-circle::after {
      content: "";
      position: absolute;
      bottom: 8px;
      right: 15px;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, rgba(210, 180, 100, 0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .time-digits {
      font-size: 4.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', 'Courier New', 'Segoe UI', monospace;
      text-align: center;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #f9efcf, #e9d6a3, #c9aa6b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      transition: 0.2s;
    }

    .milli {
      font-size: 2.2rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #ffe6b3, #dbb45c);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* control buttons - like polished pushers */
    .controls {
      display: flex;
      justify-content: center;
      gap: 1.3rem;
      flex-wrap: wrap;
      margin: 2rem 0 1.2rem;
    }

    .btn {
      border: none;
      background: linear-gradient(145deg, #2a2e3f, #1b1e2b);
      backdrop-filter: blur(8px);
      padding: 0.85rem 1.8rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      color: #f4e5c7;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(210, 180, 120, 0.5);
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,200,0.1);
      font-family: inherit;
    }

    .btn-start {
      background: linear-gradient(145deg, #2a6e3f, #1c4a2c);
      border-color: #9fdf9f;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4), inset 0 1px 0 #9effb0;
      color: #f9ffe6;
    }

    .btn-start:hover {
      background: linear-gradient(145deg, #368a50, #236638);
      transform: scale(1.02);
      border-color: #d4ffb0;
    }

    .btn-pause {
      background: linear-gradient(145deg, #a6452a, #772f19);
      border-color: #ffbb88;
    }

    .btn-pause:hover {
      background: linear-gradient(145deg, #c45a38, #943c22);
      transform: scale(1.02);
    }

    .btn-reset {
      background: linear-gradient(145deg, #3d3e52, #252833);
      border-color: #dbb06e;
    }

    .btn-reset:hover {
      background: #4e506b;
      border-color: #ffcf8a;
    }

    .btn-lap {
      background: linear-gradient(145deg, #2a3c5e, #19253d);
      border-color: #8fbbff;
    }

    .btn-lap:hover {
      background: #2e4570;
    }

    .btn:active {
      transform: scale(0.96);
    }

    /* lap section - like a chronograph register */
    .lap-section {
      margin-top: 2rem;
      border-radius: 2rem;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      padding: 0.2rem 0.2rem 0.2rem 0;
      border: 1px solid rgba(200, 170, 100, 0.4);
      box-shadow: inset 0 0 12px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3);
    }

    .lap-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
      font-weight: 600;
      color: #eedba7;
      border-bottom: 1px solid rgba(210, 180, 100, 0.6);
      letter-spacing: 1.5px;
      font-size: 0.85rem;
      text-transform: uppercase;
      background: rgba(0,0,0,0.2);
      border-radius: 2rem 2rem 0 0;
    }

    .lap-list {
      max-height: 260px;
      overflow-y: auto;
      padding: 0.4rem 0.5rem;
      scrollbar-width: thin;
    }

    .lap-list::-webkit-scrollbar {
      width: 5px;
    }

    .lap-list::-webkit-scrollbar-track {
      background: #1f1e2a;
      border-radius: 10px;
    }

    .lap-list::-webkit-scrollbar-thumb {
      background: #cbad70;
      border-radius: 10px;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(22, 24, 34, 0.8);
      margin: 8px 6px;
      padding: 10px 18px;
      border-radius: 60px;
      font-family: monospace;
      font-weight: 500;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(210, 180, 100, 0.35);
      transition: all 0.2s;
      animation: fadeSlideIn 0.2s ease;
      color: #f2e2c2;
    }

    .lap-number {
      color: #efd294;
      font-weight: 700;
      background: #1f253f;
      padding: 3px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      border: 0.5px solid #dcb570;
    }

    .lap-time {
      color: #ffefcf;
      font-weight: 600;
      letter-spacing: 1px;
      font-family: monospace;
    }

    .empty-lap-message {
      text-align: center;
      padding: 1.7rem;
      color: #b89a60;
      font-style: italic;
      font-size: 0.9rem;
      text-shadow: 0 1px 2px black;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateX(18px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .btn-clear-laps {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #c9a055;
      padding: 6px 18px;
      border-radius: 40px;
      color: #f3cf94;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn-clear-laps:hover {
      background: #9b6e3e50;
      border-color: #ffcf8a;
      color: #ffe3b5;
    }

    .design-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: #af9a6b;
      letter-spacing: 1px;
      font-family: monospace;
      border-top: 0.5px dashed #c9aa6b40;
      padding-top: 12px;
    }

    @media (max-width: 480px) {
      .stopwatch-card {
        padding: 1.2rem 1rem;
      }
      .time-digits {
        font-size: 2.2rem;
        letter-spacing: 3px;
      }
      .milli {
        font-size: 1.2rem;
      }
      .btn {
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
      }
    }

    @keyframes subtlePulse {
      0% { text-shadow: 0 0 2px #dbb05c; opacity: 0.9; }
      100% { text-shadow: 0 0 12px #ffdf9e; opacity: 1; }
    }

    .running-pulse {
      animation: subtlePulse 1.1s infinite alternate;
    }

    /* extra watch gear decoration - subtle */
    .watch-gear {
      position: absolute;
      bottom: 15px;
      left: 20px;
      opacity: 0.2;
      font-size: 2rem;
      pointer-events: none;
      z-index: 1;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="stopwatch-card">
  <div class="time-circle">
    <div class="time-digits" id="displayTimer">
      00:00:00.<span class="milli" id="milliDisplay">00</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="startBtn">⌚ START</button>
    <button class="btn btn-pause" id="pauseBtn">⏸️ PAUSE</button>
    <button class="btn btn-reset" id="resetBtn">🔄 RESET</button>
    <button class="btn btn-lap" id="lapBtn">⏱️ LAP</button>
  </div>

  <div class="lap-section">
    <div class="lap-header">
      <span>⌛ CHRONOGRAPH RECORDS</span>
      <button id="clearLapsBtn" class="btn-clear-laps">🗑️ CLEAR ALL</button>
    </div>
    <div class="lap-list" id="lapListContainer">
      <div class="empty-lap-message">✦ No laps registered yet ✦<br> Press LAP to capture intervals</div>
    </div>
  </div>
  <div class="design-footer">
    ⌚ HOROLOGY EDITION | PRECISION TIMEPIECE
  </div>
  <div class="watch-gear">⚙️ ⌛ ⚙️</div>
</div>

<script>
  // STOPWATCH CORE (same robust engine, enhanced theme)
  let startTime = 0;
  let accumulatedTime = 0;
  let running = false;
  let animationFrameId = null;
  
  const mainTimeDisplay = document.getElementById('displayTimer');
  const milliSpan = document.getElementById('milliDisplay');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const lapBtn = document.getElementById('lapBtn');
  const clearLapsBtn = document.getElementById('clearLapsBtn');
  const lapContainer = document.getElementById('lapListContainer');

  let lapsArray = [];

  function formatTime(ms) {
    if (ms < 0) ms = 0;
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    const milliseconds = ms % 1000;
    
    const hourStr = hours < 10 ? '0' + hours : '' + hours;
    const minuteStr = minutes < 10 ? '0' + minutes : '' + minutes;
    const secondStr = seconds < 10 ? '0' + seconds : '' + seconds;
    let milliStr = Math.floor(milliseconds / 10);
    if (milliStr < 10) milliStr = '0' + milliStr;
    else milliStr = '' + milliStr;
    
    const finalHour = hours > 99 ? '99' : hourStr;
    return {
      main: `${finalHour}:${minuteStr}:${secondStr}`,
      milli: milliStr
    };
  }

  function getCurrentElapsed() {
    if (running) {
      return accumulatedTime + (Date.now() - startTime);
    } else {
      return accumulatedTime;
    }
  }

  function updateDisplay() {
    const elapsedMs = getCurrentElapsed();
    const { main, milli } = formatTime(elapsedMs);
    mainTimeDisplay.innerHTML = `${main}.<span class="milli" id="milliDisplay">${milli}</span>`;
  }

  function startAnimationLoop() {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    function updateLoop() {
      updateDisplay();
      animationFrameId = requestAnimationFrame(updateLoop);
    }
    animationFrameId = requestAnimationFrame(updateLoop);
  }

  function stopAnimationLoop() {
    if (animationFrameId) {
      cancelAnimationFrame(animationFrameId);
      animationFrameId = null;
    }
  }

  function refreshAnimationState() {
    if (running) {
      if (!animationFrameId) startAnimationLoop();
    } else {
      if (animationFrameId) stopAnimationLoop();
      updateDisplay();
    }
  }

  function renderLaps() {
    if (!lapContainer) return;
    if (lapsArray.length === 0) {
      lapContainer.innerHTML = `<div class="empty-lap-message">✦ No laps registered yet ✦<br> Press LAP to capture intervals</div>`;
      return;
    }
    const fragment = document.createDocumentFragment();
    lapsArray.forEach((lap) => {
      const lapDiv = document.createElement('div');
      lapDiv.className = 'lap-item';
      lapDiv.innerHTML = `
        <span class="lap-number">⌚ LAP ${lap.lapNumber}</span>
        <span class="lap-time">⏱️ ${lap.formattedTime}</span>
      `;
      fragment.appendChild(lapDiv);
    });
    lapContainer.innerHTML = '';
    lapContainer.appendChild(fragment);
    if (lapContainer.lastChild) {
      lapContainer.lastChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  function recordLap() {
    const currentElapsed = getCurrentElapsed();
    const { main, milli } = formatTime(currentElapsed);
    const fullFormatted = `${main}.${milli}`;
    const newLapNumber = lapsArray.length + 1;
    lapsArray.push({
      lapNumber: newLapNumber,
      formattedTime: fullFormatted,
      rawMs: currentElapsed
    });
    renderLaps();
  }

  function clearAllLaps() {
    lapsArray = [];
    renderLaps();
  }

  function startStopwatch() {
    if (running) return;
    startTime = Date.now();
    running = true;
    refreshAnimationState();
    if (mainTimeDisplay) mainTimeDisplay.classList.add('running-pulse');
  }

  function pauseStopwatch() {
    if (!running) return;
    accumulatedTime += (Date.now() - startTime);
    running = false;
    refreshAnimationState();
    if (mainTimeDisplay) mainTimeDisplay.classList.remove('running-pulse');
  }

  function resetStopwatch() {
    if (running) {
      running = false;
      refreshAnimationState();
      if (mainTimeDisplay) mainTimeDisplay.classList.remove('running-pulse');
    }
    accumulatedTime = 0;
    startTime = 0;
    updateDisplay();
  }

  // Keyboard shortcuts with watchmaker vibe
  function handleKeyPress(e) {
    const key = e.key.toLowerCase();
    if (key === ' ' || key === 'space') {
      e.preventDefault();
      if (running) pauseStopwatch();
      else startStopwatch();
    } else if (key === 'r') {
      e.preventDefault();
      resetStopwatch();
    } else if (key === 'l') {
      e.preventDefault();
      recordLap();
    } else if (key === 'c') {
      e.preventDefault();
      clearAllLaps();
    }
  }

  function bindEvents() {
    startBtn.addEventListener('click', startStopwatch);
    pauseBtn.addEventListener('click', pauseStopwatch);
    resetBtn.addEventListener('click', resetStopwatch);
    lapBtn.addEventListener('click', () => recordLap());
    clearLapsBtn.addEventListener('click', clearAllLaps);
    window.addEventListener('keydown', handleKeyPress);
  }

  window.addEventListener('beforeunload', () => {
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
  });

  // Additional watch-theme micro-interactions: add subtle crystal shine on hover
  const card = document.querySelector('.stopwatch-card');
  if (card) {
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const shine = `radial-gradient(circle at ${x}px ${y}px, rgba(255,235,180,0.15) 0%, transparent 60%)`;
      card.style.background = `linear-gradient(145deg, rgba(25, 28, 38, 0.85), rgba(12, 15, 24, 0.9)), ${shine}`;
    });
    card.addEventListener('mouseleave', () => {
      card.style.background = 'linear-gradient(145deg, rgba(25, 28, 38, 0.85), rgba(12, 15, 24, 0.9))';
    });
  }

  function initDisplay() {
    updateDisplay();
    renderLaps();
    refreshAnimationState();
  }

  initDisplay();
  bindEvents();
  
  // extra watch second hand style: dynamic but not needed. just atmosphere
  console.log('⌚ ChronoMax | Horology Stopwatch | Prodigy Infotech Task-02');
</script>
</body>
</html>
